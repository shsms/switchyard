<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>switchyard</title>
    <link rel="stylesheet" href="/assets/vendor/uplot.min.css" />
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/vendor/cytoscape.min.js"></script>
    <script src="/assets/vendor/uplot.min.js"></script>
  </head>
  <body>
    <header>
      <strong>switchyard</strong>
      <span id="status" class="status">connecting…</span>
    </header>
    <main id="app">
      <div id="topology"></div>
      <aside id="side">
        <p class="hint">Click a node to inspect.</p>
      </aside>
      <section id="repl">
        <div id="repl-output"></div>
        <form id="repl-form">
          <textarea id="repl-input" rows="2" spellcheck="false"
                    placeholder="(eval lisp here — ctrl/cmd+enter to run)"></textarea>
          <button type="submit">Eval</button>
        </form>
      </section>
    </main>
    <noscript>This UI requires JavaScript.</noscript>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
