<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>switchyard</title>
    <link rel="stylesheet" href="/assets/vendor/vis-network.min.css" />
    <link rel="stylesheet" href="/assets/vendor/uplot.min.css" />
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/vendor/vis-network.min.js"></script>
    <script src="/assets/vendor/uplot.min.js"></script>
  </head>
  <body>
    <header>
      <strong>switchyard</strong>
      <span id="status" class="status">connecting…</span>
      <span class="spacer"></span>
      <button id="scenarios-btn" class="hdr-btn">Scenarios</button>
      <button id="defaults-btn" class="hdr-btn">Defaults</button>
      <span id="pending-pill" class="pending-pill" hidden>
        <span id="pending-count">0</span> unsaved
      </span>
      <button id="discard-btn" class="hdr-btn" disabled>Discard</button>
      <button id="persist-btn" class="hdr-btn primary" disabled>Persist</button>
    </header>
    <main id="app">
      <div id="topology"></div>
      <div id="splitter" title="Drag to resize"></div>
      <aside id="side">
        <div id="inspect">
          <p class="hint">Click a node to inspect. Right-click to delete.</p>
        </div>
        <div id="add-form">
          <h2>Add component</h2>
          <div class="add-row">
            <select id="add-category">
              <option value="make-grid">grid</option>
              <option value="make-meter" selected>meter</option>
              <option value="make-battery">battery</option>
              <option value="make-battery-inverter">battery-inverter</option>
              <option value="make-solar-inverter">solar-inverter</option>
              <option value="make-ev-charger">ev-charger</option>
              <option value="make-chp">chp</option>
            </select>
            <button id="add-btn" class="hdr-btn primary">Create</button>
          </div>
          <p class="hint">
            Uses category defaults; auto-assigns id. Wire it up via
            click-drag (coming soon) or REPL.
          </p>
        </div>
      </aside>
      <section id="repl">
        <div id="logs"></div>
        <div id="repl-output"></div>
        <form id="repl-form">
          <div id="repl-input-wrap">
            <textarea id="repl-input" rows="2" spellcheck="false"
                      autocomplete="off"
                      placeholder="(eval lisp here — ctrl/cmd+enter to run, tab to complete)"></textarea>
            <ul id="repl-completions" hidden></ul>
          </div>
          <button type="submit">Eval</button>
        </form>
      </section>
    </main>
    <noscript>This UI requires JavaScript.</noscript>
    <dialog id="pending-dialog">
      <header>
        <h3>Unsaved changes</h3>
        <button id="pending-dialog-close" type="button">×</button>
      </header>
      <div id="pending-dialog-content"></div>
    </dialog>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
